<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APNA_HISAAB | Team_Unofficials</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* CSS Variables */
        :root {
            --primary: #2b6cb0;
            --income: #38a169;
            --expense: #e53e3e;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Header Styling */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
        }

        .brand h1 { color: var(--primary); font-size: 24px; }
        .brand p { color: var(--text-muted); font-size: 14px; }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn:hover { background-color: #2c5282; }
        .btn-reset { background-color: var(--expense); }
        .btn-reset:hover { background-color: #c53030; }

        /* Grid Layout */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        .card h2 {
            font-size: 18px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 10px;
        }

        /* Totals Box */
        .summary-box {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            background: var(--bg-color);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .summary-item h3 { font-size: 12px; color: var(--text-muted); text-transform: uppercase; }
        .summary-item p { font-size: 20px; font-weight: 700; }
        .text-green { color: var(--income); }
        .text-red { color: var(--expense); }
        .text-blue { color: var(--primary); }

        /* Form Inputs */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 14px; margin-bottom: 5px; font-weight: 500; }
        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            background-color: #fff;
        }

        /* Transaction List */
        .transaction-list {
            list-style: none;
            max-height: 300px;
            overflow-y: auto;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--bg-color);
        }

        .transaction-info {
            display: flex;
            flex-direction: column;
        }

        .transaction-category {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg-color);
            padding: 2px 6px;
            border-radius: 4px;
            margin-top: 4px;
            width: fit-content;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--expense);
            cursor: pointer;
            padding: 5px;
        }

        /* Footer */
        footer { text-align: center; margin-top: 40px; color: var(--text-muted); font-size: 14px; }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <div class="brand">
                <h1>APNA_HISAAB</h1>
                <p>Created by Team_Unofficials | IT-1</p>
            </div>
            <button class="btn btn-reset" onclick="resetData()">Clear Data</button>
        </header>

        <div class="dashboard">
            <div class="card">
                <h2>Add New Transaction</h2>
                <form id="form">
                    <div class="form-group">
                        <label>Description</label>
                        <input type="text" id="text" class="form-control" placeholder="e.g., Canteen, Books" required>
                    </div>
                    <div class="form-group">
                        <label>Amount (Use negative for expense, e.g., -50)</label>
                        <input type="number" id="amount" class="form-control" placeholder="Enter amount" required>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="category" class="form-control" required>
                            <option value="Food & Dining">Food & Dining</option>
                            <option value="Travel & Transport">Travel & Transport</option>
                            <option value="Utilities & Bills">Utilities & Bills</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Education/Books">Education/Books</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <button type="submit" class="btn" style="width: 100%;">Add Transaction</button>
                </form>
            </div>

            <div class="card">
                <h2>Financial Overview</h2>
                <div class="summary-box">
                    <div class="summary-item">
                        <h3>Balance</h3>
                        <p id="balance" class="text-blue">₹0</p>
                    </div>
                    <div class="summary-item">
                        <h3>Income</h3>
                        <p id="money-plus" class="text-green">+₹0</p>
                    </div>
                    <div class="summary-item">
                        <h3>Expense</h3>
                        <p id="money-minus" class="text-red">-₹0</p>
                    </div>
                </div>
                
                <div style="position: relative; height: 180px; width: 100%;">
                    <canvas id="myChart"></canvas>
                </div>

                <h3 style="text-align: center; margin-top: 24px; margin-bottom: 10px; font-size: 14px; color: var(--text-muted);">Expense Breakdown by Category</h3>
                <div style="position: relative; height: 180px; width: 100%;">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>
        </div>

        <div class="card" style="margin-top: 24px;">
            <h2>Transaction History</h2>
            <ul id="list" class="transaction-list">
            </ul>
        </div>

        <footer>
            <p>MMCOE IT Dept - First Year Mini-Project Submission</p>
        </footer>
    </div>

    <script>
        const balance = document.getElementById('balance');
        const money_plus = document.getElementById('money-plus');
        const money_minus = document.getElementById('money-minus');
        const list = document.getElementById('list');
        const form = document.getElementById('form');
        const text = document.getElementById('text');
        const amount = document.getElementById('amount');
        const category = document.getElementById('category'); // NEW DOM Element

        const localStorageTransactions = JSON.parse(localStorage.getItem('transactions'));
        let transactions = localStorage.getItem('transactions') !== null ? localStorageTransactions : [];

        let expenseChart;
        let categoryChartInstance; // NEW Chart variable

        function addTransaction(e) {
            e.preventDefault();

            // Logic to force 'Income' category if the amount is positive
            let finalCategory = category.value;
            if (+amount.value > 0) {
                finalCategory = 'Income'; 
            }

            const transaction = {
                id: Math.floor(Math.random() * 100000000),
                text: text.value,
                amount: +amount.value,
                category: finalCategory // Save the category
            };

            transactions.push(transaction);
            addTransactionDOM(transaction);
            updateValues();
            updateLocalStorage();

            text.value = '';
            amount.value = '';
        }

        function addTransactionDOM(transaction) {
            const sign = transaction.amount < 0 ? '-' : '+';
            const item = document.createElement('li');
            item.classList.add('transaction-item');

            // Updated HTML to show the category tag below the description
            item.innerHTML = `
                <div class="transaction-info">
                    <span>${transaction.text}</span>
                    <span class="transaction-category">${transaction.category}</span>
                </div>
                <div>
                    <span class="${transaction.amount < 0 ? 'text-red' : 'text-green'}" style="margin-right: 15px; font-weight: 500;">
                        ${sign}₹${Math.abs(transaction.amount)}
                    </span>
                    <button class="delete-btn" onclick="removeTransaction(${transaction.id})"><i class="fas fa-trash"></i></button>
                </div>
            `;
            list.appendChild(item);
        }

        function updateValues() {
            const amounts = transactions.map(transaction => transaction.amount);

            const total = amounts.reduce((acc, item) => (acc += item), 0).toFixed(2);
            const income = amounts.filter(item => item > 0).reduce((acc, item) => (acc += item), 0).toFixed(2);
            const expense = (amounts.filter(item => item < 0).reduce((acc, item) => (acc += item), 0) * -1).toFixed(2);

            balance.innerText = `₹${total}`;
            money_plus.innerText = `+₹${income}`;
            money_minus.innerText = `-₹${expense}`;

            updateChart(income, expense);
            updateCategoryChart(); // Trigger the new chart update
        }

        function removeTransaction(id) {
            transactions = transactions.filter(transaction => transaction.id !== id);
            updateLocalStorage();
            init();
        }

        function resetData() {
            if (confirm('Are you sure you want to clear all data?')) {
                transactions = [];
                updateLocalStorage();
                init();
            }
        }

        function updateLocalStorage() {
            localStorage.setItem('transactions', JSON.stringify(transactions));
        }

        // 1st Chart: Income vs Expense
        function updateChart(income, expense) {
            const ctx = document.getElementById('myChart').getContext('2d');
            if (expenseChart) { expenseChart.destroy(); }

            expenseChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Income', 'Expense'],
                    datasets: [{
                        data: [income, expense],
                        backgroundColor: ['#38a169', '#e53e3e'],
                        borderWidth: 0
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        // NEW 2nd Chart: Expense Breakdown by Category
        function updateCategoryChart() {
            const ctx = document.getElementById('categoryChart').getContext('2d');
            if (categoryChartInstance) { categoryChartInstance.destroy(); }

            // Filter out income, we only want to chart expenses
            const expenses = transactions.filter(t => t.amount < 0);
            
            // Calculate totals for each category
            const categoryTotals = {};
            expenses.forEach(t => {
                categoryTotals[t.category] = (categoryTotals[t.category] || 0) + Math.abs(t.amount);
            });

            // Get labels and data for Chart.js
            const labels = Object.keys(categoryTotals);
            const data = Object.values(categoryTotals);

            // Fun colors for the pie chart
            const colors = ['#f6ad55', '#4fd1c5', '#fc8181', '#63b3ed', '#b794f4', '#f6e05e', '#a0aec0'];

            categoryChartInstance = new Chart(ctx, {
                type: 'pie', // Using a Pie chart instead of doughnut for variety
                data: {
                    labels: labels.length > 0 ? labels : ['No Expenses Yet'],
                    datasets: [{
                        data: data.length > 0 ? data : [1], // Show a grey circle if empty
                        backgroundColor: data.length > 0 ? colors.slice(0, labels.length) : ['#e2e8f0'],
                        borderWidth: 0
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'right', labels: { boxWidth: 12, font: {size: 11} } }
                    }
                }
            });
        }

        function init() {
            list.innerHTML = '';
            transactions.forEach(addTransactionDOM);
            updateValues();
        }

        init();
        form.addEventListener('submit', addTransaction);
    </script>
</body>
</html>
