<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APNA_HISAAB | Team_Unofficials </title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        /* CSS for color management */
        :root {
            --primary: #2b6cb0; /* Blue */
            --income: #38a169;  /* Green */
            --expense: #e53e3e; /* Red */
            --bg-color: #f4f7f6; /* Off-white background */
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif; /* Clean font */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Header Styling */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
        }

        .brand h1 {
            color: var(--primary);
            font-size: 24px;
        }

        .brand p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn:hover { background-color: #2c5282; }
        
        .btn-reset { background-color: var(--expense); }
        .btn-reset:hover { background-color: #c53030; }

        /* Grid Layout */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; } /* Stacks on mobile */
        }

        .card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        .card h2 {
            font-size: 18px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 10px;
        }

        /* Totals Box */
        .summary-box {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            background: var(--bg-color);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .summary-item h3 {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .summary-item p {
            font-size: 20px;
            font-weight: 700;
        }

        .text-green { color: var(--income); }
        .text-red { color: var(--expense); }
        .text-blue { color: var(--primary); }

        /* Form Inputs */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 14px; margin-bottom: 5px; font-weight: 500;}
        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
        }

        /* Transaction List */
        .transaction-list {
            list-style: none;
            max-height: 300px;
            overflow-y: auto;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--bg-color);
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--expense);
            cursor: pointer;
            padding: 5px;
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 40px;
            color: var(--text-muted);
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
       <header>
        <div>
            <h1>APNA_HISAAB</h1>
            <p>Created by Team_Unofficials | IT-1</p>
        </div>
    <button class="btn btn-reset" onclick="resetData()">Clear Data</button>
</header>

        <div class="dashboard">
            <div class="card">
                <h2>Add New Transaction</h2>
                <form id="form">
                    <div class="form-group">
                        <label>Description</label>
                        <input type="text" id="text" class="form-control" placeholder="e.g., Canteen, Books" required>
                    </div>
                    <div class="form-group">
                        <label>Amount (Use negative for expense, e.g., -50)</label>
                        <input type="number" id="amount" class="form-control" placeholder="Enter amount" required>
                    </div>
                    <button type="submit" class="btn" style="width: 100%;">Add Transaction</button>
                </form>
            </div>

            <div class="card">
                <h2>Financial Overview</h2>
                <div class="summary-box">
                    <div class="summary-item">
                        <h3>Balance</h3>
                        <p id="balance" class="text-blue">₹0</p>
                    </div>
                    <div class="summary-item">
                        <h3>Income</h3>
                        <p id="money-plus" class="text-green">+₹0</p>
                    </div>
                    <div class="summary-item">
                        <h3>Expense</h3>
                        <p id="money-minus" class="text-red">-₹0</p>
                    </div>
                </div>
                <canvas id="myChart" height="150"></canvas>
            </div>
        </div>

        <div class="card" style="margin-top: 24px;">
            <h2>Transaction History</h2>
            <ul id="list" class="transaction-list">
                </ul>
        </div>

        <footer>
            <p>MMCOE IT Dept - First Year Mini-Project Submission</p>
        </footer>
    </div>

    <script>
        // --- 1. GETTING ELEMENTS FROM THE HTML ---
        const balance = document.getElementById('balance');
        const money_plus = document.getElementById('money-plus');
        const money_minus = document.getElementById('money-minus');
        const list = document.getElementById('list');
        const form = document.getElementById('form');
        const text = document.getElementById('text');
        const amount = document.getElementById('amount');

        // --- 2. LOCAL STORAGE SETUP ---
        // Checks if there is existing data saved in the browser. If not, creates an empty array.
        const localStorageTransactions = JSON.parse(localStorage.getItem('transactions'));
        let transactions = localStorage.getItem('transactions') !== null ? localStorageTransactions : [];

        // Chart variable to keep track of the graph instance
        let expenseChart; 

        // --- 3. ADDING A TRANSACTION ---
        function addTransaction(e) {
            e.preventDefault(); // Prevents the page from reloading when submitting the form

            const transaction = {
                id: Math.floor(Math.random() * 100000000), // Generate a random ID
                text: text.value,
                amount: +amount.value // The '+' converts the string to a number
            };

            transactions.push(transaction); // Add to our array
            addTransactionDOM(transaction); // Show it on the screen
            updateValues(); // Update the math
            updateLocalStorage(); // Save to browser

            text.value = ''; // Clear form
            amount.value = '';
        }

        // --- 4. SHOWING DATA ON THE SCREEN (DOM Manipulation) ---
        function addTransactionDOM(transaction) {
            const sign = transaction.amount < 0 ? '-' : '+';
            const item = document.createElement('li');
            item.classList.add('transaction-item');

            // Injecting HTML for a single list item
            item.innerHTML = `
                <span>${transaction.text}</span> 
                <span class="${transaction.amount < 0 ? 'text-red' : 'text-green'}">
                    ${sign}₹${Math.abs(transaction.amount)}
                </span>
                <button class="delete-btn" onclick="removeTransaction(${transaction.id})"><i class="fas fa-trash"></i></button>
            `;
            list.appendChild(item);
        }

        // --- 5. CALCULATING THE MATH & UPDATING CHART ---
        function updateValues() {
            const amounts = transactions.map(transaction => transaction.amount);

            // Calculate totals using the reduce() method
            const total = amounts.reduce((acc, item) => (acc += item), 0).toFixed(2);
            const income = amounts.filter(item => item > 0).reduce((acc, item) => (acc += item), 0).toFixed(2);
            const expense = (amounts.filter(item => item < 0).reduce((acc, item) => (acc += item), 0) * -1).toFixed(2);

            // Update text on screen
            balance.innerText = `₹${total}`;
            money_plus.innerText = `+₹${income}`;
            money_minus.innerText = `-₹${expense}`;

            // Update Chart
            updateChart(income, expense);
        }

        // --- 6. REMOVE AND RESET DATA ---
        function removeTransaction(id) {
            transactions = transactions.filter(transaction => transaction.id !== id);
            updateLocalStorage();
            init(); // Re-render everything
        }

        function resetData() {
            if(confirm('Are you sure you want to clear all data?')) {
                transactions = [];
                updateLocalStorage();
                init();
            }
        }

        function updateLocalStorage() {
            localStorage.setItem('transactions', JSON.stringify(transactions));
        }

        // --- 7. CHART.JS INTEGRATION ---
        function updateChart(income, expense) {
            const ctx = document.getElementById('myChart').getContext('2d');
            
            // If a chart already exists, destroy it before making a new one to prevent glitching
            if(expenseChart) { expenseChart.destroy(); }

            expenseChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Income', 'Expense'],
                    datasets: [{
                        data: [income, expense],
                        backgroundColor: ['#38a169', '#e53e3e'],
                        borderWidth: 0
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        // --- 8. INITIALIZE THE APP ---
        function init() {
            list.innerHTML = ''; // Clear the list HTML
            transactions.forEach(addTransactionDOM); // Loop through data and create list items
            updateValues(); // Run the math
        }

        init(); // Start the app when the page loads
        form.addEventListener('submit', addTransaction); // Listen for the form submission
    </script>
</body>

</html>
